<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TIS 3D In-silico Navigator</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; font-family: "Segoe UI", Arial, sans-serif; }
  #app { display: flex; height: 100vh; }

  /* 좌측 컨트롤 패널 */
  #panel {
    width: 340px; flex-shrink: 0; background: #1E2128; color: #e6e6e6;
    padding: 18px; overflow-y: auto; box-shadow: 2px 0 12px rgba(0,0,0,.5); z-index: 10;
  }
  #panel h2 { margin: 0 0 4px; font-size: 18px; }
  #panel .sub { color: #8B9BB4; font-size: 12px; margin-bottom: 18px; }
  #panel h4 { color: #8B9BB4; margin: 22px 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
  label.fld { display: block; font-size: 12px; color: #aab; margin: 8px 0 3px; }
  input[type=text], select {
    width: 100%; padding: 8px; background: #2C313C; color: #fff;
    border: 1px solid #444; border-radius: 4px; font-size: 13px;
  }
  .row { display: flex; gap: 8px; }
  .row > div { flex: 1; }
  button.add { width: 100%; margin-top: 8px; padding: 8px; background: #2F6FED; color: #fff;
    border: 0; border-radius: 4px; cursor: pointer; font-size: 13px; }
  button.add:hover { background: #3f7ffd; }
  #regionChips { margin-top: 10px; }
  .chip { display: flex; align-items: center; gap: 8px; background: #2C313C; border-radius: 4px;
    padding: 6px 8px; margin-bottom: 5px; font-size: 13px; }
  .chip .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .chip .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip .x { cursor: pointer; color: #888; padding: 0 4px; }
  .chip .x:hover { color: #f55; }
  .chip .ceassign { font-size: 11px; padding: 2px; max-width: 96px; background: #3a4150; color: #cfd6e0;
    border: 1px solid #4a5363; border-radius: 3px; }
  /* 8채널 페어 행 */
  .chhdr { display: flex; gap: 6px; font-size: 10px; color: #8a93a3; margin: 0 0 4px; padding-left: 47px; }
  .chhdr span { flex: 1; }
  .chrow { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .chrow .chdot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .chrow .chlbl { width: 28px; font-size: 12px; color: #aab; flex-shrink: 0; }
  .chrow .chsel { flex: 1; min-width: 0; padding: 5px; font-size: 12px; }
  #legend .lgdot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 4px; }
  .toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 6px 0; }
  #status { font-size: 11px; color: #777; margin-top: 14px; min-height: 14px; }

  /* 우측 뷰어 */
  #view { flex: 1; position: relative; background: #000; }
  #view canvas { display: block; }
  #legend { position: absolute; top: 12px; right: 14px; background: rgba(20,22,28,.75);
    color: #ccc; font-size: 11px; padding: 8px 10px; border-radius: 5px; line-height: 1.7; }
  #legend b { color: #fff; }

  /* 전극 호버 툴팁 */
  #tooltip { position: absolute; pointer-events: none; display: none; z-index: 20;
    background: rgba(20,22,28,.95); color: #eee; border: 1px solid #3a4150;
    border-radius: 5px; padding: 8px 10px; font-size: 12px; line-height: 1.6;
    box-shadow: 0 2px 10px rgba(0,0,0,.6); white-space: nowrap; }
  #tooltip .t-name { font-weight: bold; font-size: 14px; color: #fff; margin-bottom: 4px; }
  #tooltip .t-row { color: #b9c2d0; }
  #tooltip .t-row b { color: #fff; font-weight: 600; }

  /* 사용자 전극 / 보조 버튼 */
  button.add.on { background: #1f9d8b; }
  button.add.on:hover { background: #25b6a1; }
  button.add.ghost { background: #2C313C; border: 1px solid #444; }
  button.add.ghost:hover { background: #353b47; }

  /* MRI 단면(3D MPR) 컨트롤 박스 */
  #slicePanel { position: absolute; top: 12px; left: 12px;
    display: none; flex-direction: column; gap: 7px; width: 280px;
    background: rgba(20,22,28,.95); border: 1px solid #3a4150; border-radius: 8px;
    padding: 12px; z-index: 15; box-shadow: 0 6px 24px rgba(0,0,0,.6); color: #e6e6e6; }
  #slicePanel .sp-head { display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: 600; color: #cdd6e3; }
  #slicePanel .sp-x { cursor: pointer; color: #99a; padding: 0 4px; }
  #slicePanel .sp-x:hover { color: #f55; }
  #slicePanel .sp-row { display: flex; align-items: center; gap: 7px; }
  #slicePanel .sp-ck { display: flex; align-items: center; gap: 4px; font-size: 12px; width: 80px; flex-shrink: 0; }
  #slicePanel .sp-ax { color: #8a93a3; font-size: 10px; }
  #slicePanel .sp-sl { flex: 1; min-width: 0; }
  #slicePanel .sp-mm { font-size: 10px; color: #9aa6b6; width: 50px; text-align: right; flex-shrink: 0; }
  #slicePanel .sp-hint { font-size: 10px; color: #7a8494; line-height: 1.4; }
  #slicePanel input[type=range] { width: 100%; }
</style>
</head>
<body>
<div id="app">
  <div id="panel">
    <h2>TIS 3D Navigator</h2>
    <div class="sub">client-side WebGL · Mouse / Rat</div>

    <label class="fld">종 (Species)</label>
    <select id="species" style="margin-bottom:6px">
      <option value="mouse">Mouse — Allen CCFv3 × TIP-lite</option>
      <option value="rat">Rat — WHS SD Atlas v4</option>
    </select>

    <h4>해부 영역</h4>
    <label class="fld">이름 / 약어로 검색 후 선택</label>
    <input type="text" id="regionSearch" list="regionList" placeholder="예: VISp, Thalamus..." />
    <datalist id="regionList"></datalist>
    <button class="add" id="addRegion">+ 영역 추가</button>
    <div id="regionChips"></div>

    <h4>전극 채널 설정 (최대 8채널)</h4>
    <div class="chhdr"><span>＋ (red)</span><span>− (blue)</span></div>
    <div id="channelRows"></div>

    <h4>표시 옵션</h4>
    <label class="toggle"><input type="checkbox" id="tgBrain" checked /> 전체 뇌 윤곽</label>
    <label class="toggle"><input type="checkbox" id="tgCortex" checked /> 피질 기준 마스크 (red)</label>
    <label class="toggle"><input type="checkbox" id="tgAllLabels" /> 전체 전극 라벨</label>

    <h4>사용자 전극 (커스텀)</h4>
    <label class="fld">이름 (선택 — 비우면 자동)</label>
    <input type="text" id="ceName" placeholder="예: TARGET1" />
    <button class="add" id="tgPlacement">표면 클릭으로 추가</button>
    <div class="row" style="margin-top:8px">
      <div><label class="fld">AP (mm)</label><input type="text" id="ceAP" placeholder="0.0" /></div>
      <div><label class="fld">ML (mm)</label><input type="text" id="ceML" placeholder="0.0" /></div>
    </div>
    <button class="add" id="ceAddCoord" style="margin-top:6px">AP/ML 좌표로 추가 (Rat)</button>
    <div id="customChips" style="margin-top:8px"></div>
    <div class="row" style="margin-top:6px">
      <button class="add ghost" id="ceExport">내보내기(JSON)</button>
      <label class="add ghost" style="text-align:center; cursor:pointer; margin-top:8px; display:block">
        가져오기<input type="file" id="ceImport" accept="application/json" style="display:none" /></label>
    </div>

    <h4>2D 단면 (Rat MRI)</h4>
    <button class="add" id="openSlices" style="display:none">2D MRI 슬라이스 열기</button>

    <div id="status">로딩 중...</div>
  </div>

  <div id="view">
    <div id="legend">
      <b>CH1</b> 빨강(+)·파랑(−)<br />
      <b>CH2</b> 빨강(+)·파랑(−)<br />
      점선 = 채널 페어
    </div>
    <div id="tooltip"></div>

    <div id="slicePanel">
      <div class="sp-head">
        <span>MRI 단면 (3D 겹침 · WHS T2*)</span>
        <span id="sliceClose" class="sp-x">✕</span>
      </div>
      <div class="sp-row">
        <label class="sp-ck"><input type="checkbox" id="chkSag" /> YZ <span class="sp-ax">시상</span></label>
        <input type="range" id="sldSag" class="sp-sl" min="0" max="0" value="0" /><span id="infoSag" class="sp-mm"></span>
      </div>
      <div class="sp-row">
        <label class="sp-ck"><input type="checkbox" id="chkCor" checked /> XZ <span class="sp-ax">관상</span></label>
        <input type="range" id="sldCor" class="sp-sl" min="0" max="0" value="0" /><span id="infoCor" class="sp-mm"></span>
      </div>
      <div class="sp-row">
        <label class="sp-ck"><input type="checkbox" id="chkAxi" /> XY <span class="sp-ax">수평</span></label>
        <input type="range" id="sldAxi" class="sp-sl" min="0" max="0" value="0" /><span id="infoAxi" class="sp-mm"></span>
      </div>
      <label class="toggle"><input type="checkbox" id="sliceOverlayChk" checked /> 영역 색칠 오버레이</label>
      <label class="fld">오버레이 투명도</label>
      <input type="range" id="sliceOpacity" min="0" max="100" value="60" />
      <div class="sp-hint">단면의 색칠 영역에 마우스를 올리면 영역명이 표시됩니다.</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="/web/main.js"></script>
</body>
</html>
